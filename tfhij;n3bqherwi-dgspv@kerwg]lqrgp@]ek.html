<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>市場データ取得（自動更新）</title>
</head>
<body>
    <h1>現在の市場データ（5秒おきにリロード中）</h1>
    <div id="fx-rate">ドル円: 読み込み中...</div>
    <div id="nikkei-price">日経平均: 読み込み中...</div>

    <script>
        const API_KEY = 'LJOJ1Q3YFUCQPTS0'; 
        const REFRESH_INTERVAL = 5000; // 更新間隔（5000ミリ秒 = 5秒）

        // 1. ドル円の取得（URLを正しい形式に修正）
        async function fetchFx() {
            const url = `https://alphavantage.co{API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const rate = data["Realtime Currency Exchange Rate"]["5. Exchange Rate"];
                document.getElementById('fx-rate').innerText = `ドル円: ${parseFloat(rate).toFixed(2)} 円`;
            } catch (error) {
                document.getElementById('fx-rate').innerText = 'ドル円: 取得エラー（または回数制限）';
            }
        }

        // 2. 日経平均株価の取得（URLを正しい形式に修正）
        async function fetchNikkei() {
            const url = `https://alphavantage.co^N225&apikey=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const timeSeries = data["Time Series (Daily)"];
                const latestDate = Object.keys(timeSeries)[0];
                const closePrice = timeSeries[latestDate]["4. close"];
                
                document.getElementById('nikkei-price').innerText = `日経平均株価: ${parseFloat(closePrice).toLocaleString()} 円 (${latestDate} 終値)`;
            } catch (error) {
                document.getElementById('nikkei-price').innerText = '日経平均: 取得エラー（または回数制限）';
            }
        }

        // 3. ページ全体の自動リロード処理
        function startAutoReload() {
            setTimeout(() => {
                window.location.reload(); // ページをリロード
                // 別のURLにリダイレクトしたい場合は以下に書き換えてください
                // window.location.href = ""; 
            }, REFRESH_INTERVAL);
        }

        // 画面ロード時に実行
        async function init() {
            await Promise.all([fetchFx(), fetchNikkei()]); // 両方のデータを取得
            startAutoReload(); // 取得完了後にタイマーをスタート
        }

        init();
    </script>
</body>
</html>
